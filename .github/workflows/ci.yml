name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check . --exclude venv/

      - name: Validate config
        run: |
          python -c "
          from config import model_config, rag_config, app_config, ingest_config
          assert model_config.llm_backend in ('auto', 'groq', 'ollama')
          assert rag_config.vector_backend in ('auto', 'chroma', 'qdrant')
          assert sum(ingest_config.chapter_verse_counts.values()) == 701
          print('Config OK')
          "

      - name: Validate imports
        run: |
          python -c "import config; print('config OK')"
          python -c "import rag; print('rag OK')"
          python -c "import sys; sys.path.insert(0, 'scripts'); import ingest; print('ingest OK')"
          python -c "import sys; sys.path.insert(0, 'scripts'); import build_verses; print('build_verses OK')"

      - name: Validate verses.json
        run: |
          python - << 'PYEOF'
          import json, sys, os
          if not os.path.exists("verses.json"):
              print("SKIP: verses.json not found")
              sys.exit(0)
          with open("verses.json") as f:
              verses = json.load(f)
          required = {"chapter", "verse", "sanskrit", "transliteration", "translation"}
          errors = [k for k, v in verses.items() if required - set(v.keys())]
          if errors:
              print(f"Missing fields in: {errors[:5]}")
              sys.exit(1)
          # Check no corrupt PUA characters
          pua = [k for k, v in verses.items() if any('\ue000' <= c <= '\uf8ff' for c in v.get("sanskrit", ""))]
          if pua:
              print(f"Corrupt Sanskrit in: {pua[:5]}")
              sys.exit(1)
          print(f"OK: {len(verses)} verses validated")
          PYEOF

      - name: Run fast tests (no DB or network needed)
        env:
          GROQ_API_KEY: ${{ github.event_name == 'push' && secrets.GROQ_API_KEY || '' }}
          LLM_BACKEND: auto
          VECTOR_BACKEND: auto
        run: pytest tests/test_config.py tests/test_rag.py tests/test_build_verses.py -v --tb=short

      - name: Run full test suite
        env:
          GROQ_API_KEY: ${{ github.event_name == 'push' && secrets.GROQ_API_KEY || '' }}
          LLM_BACKEND: auto
          VECTOR_BACKEND: auto
        run: pytest -v --tb=short
