name: CD — Deploy to Streamlit Cloud

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: read

# Streamlit Cloud auto-deploys when main is updated.
# This workflow runs post-CI validation to confirm the build is healthy.

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Validate config and imports
        run: |
          python -c "
          from config import model_config, rag_config, app_config, ingest_config
          assert model_config.llm_backend in ('auto', 'groq', 'ollama'), 'Bad llm_backend'
          assert rag_config.vector_backend in ('auto', 'chroma', 'qdrant'), 'Bad vector_backend'
          print('Config OK')
          "
          python -c "import rag; print('RAG OK')"

      - name: Run fast tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_BACKEND: auto
          VECTOR_BACKEND: auto
        run: pytest tests/test_config.py tests/test_rag.py tests/test_build_verses.py -v --tb=short

      - name: Confirm deployment
        run: |
          echo ""
          echo "=========================================="
          echo "✓ CI passed"
          echo "✓ Post-deploy validation passed"
          echo "✓ Streamlit Cloud auto-deploying from main"
          echo "✓ App: https://ckrishk-gita-guide.streamlit.app"
          echo "=========================================="
