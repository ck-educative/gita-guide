name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check .

      - name: Validate config loads
        run: |
          python -c "
          from config import model_config, rag_config, app_config, ingest_config
          print('Config OK')
          "

      - name: Validate verses.json structure
        run: |
          python - << 'EOF'
          import json, sys, os
          if not os.path.exists("verses.json"):
              print("verses.json not found — skipping (run build_verses.py first)")
              sys.exit(0)
          with open("verses.json") as f:
              verses = json.load(f)
          required_keys = {"chapter", "verse", "sanskrit", "transliteration", "translation"}
          for key, v in verses.items():
              missing = required_keys - set(v.keys())
              if missing:
                  print(f"FAIL: {key} missing keys: {missing}")
                  sys.exit(1)
          print(f"OK: {len(verses)} verses validated")
          EOF

      - name: Check all imports resolve
        run: |
          python -c "import config; print('config OK')"
          python -c "import ingest; print('ingest OK')"
          python -c "import build_verses; print('build_verses OK')"

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
